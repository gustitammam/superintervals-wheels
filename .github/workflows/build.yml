name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: 'Upstream commit SHA to build from'
        required: true
        default: ''
      version_label:
        description: 'Version label for the release (e.g. v0.3.0)'
        required: true
        default: 'v0.3.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream at pinned SHA
        run: |
          SHA="${{ github.event.inputs.git_sha }}"
          git clone https://github.com/kcleal/superintervals.git upstream
          cd upstream
          git checkout $SHA
          # Patch: remove broken submodule
          rm -f .gitmodules
          rm -rf test/3rd-party
          find . -name ".gitattributes" -delete
          rm -rf .git
          git init
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "patched build at $SHA"

      - name: Build manylinux wheel
        uses: pypa/cibuildwheel@v2.22.0
        with:
          package-dir: upstream
          output-dir: dist
        env:
          CIBW_BUILD: "cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014  # glibc 2.17, very compatible

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_label }}
          name: "superintervals ${{ github.event.inputs.version_label }}"
          body: |
            Pre-built patched wheels from upstream superintervals.
            Pinned SHA: `${{ github.event.inputs.git_sha }}`
            Submodule build issue removed.
          files: dist/**/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
